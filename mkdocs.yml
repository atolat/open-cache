site_name: open-cache
site_description: Building a remote build cache from scratch — learning journal + design docs
site_url: https://open-cache.io

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: lime
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition

nav:
  - Home: index.md
  - Learning Journal:
    - Content Addressable Storage: learning/01-content-addressable-storage.md
  - Design:
    - Project Brief: PROJECT_BRIEF.md
    - AI/RL Architecture: ARCHITECTURE_AI.md
    - Testing Strategy: TESTING_STRATEGY.md
  - Research:
    - Ecosystem Analysis: RESEARCH.md
    - NativeLink Analysis: ANALYSIS_NATIVELINK.md
    - Buildbarn Analysis: ANALYSIS_BUILDBARN.md
    - Buildfarm Analysis: ANALYSIS_BUILDFARM.md
