site_name: open-cache
site_description: Building a remote build cache from scratch — learning journal + design docs
site_url: https://open-cache.io
repo_url: https://github.com/atolat/open-cache

docs_dir: docs

theme:
  name: material
  palette:
    scheme: slate
    primary: black
    accent: lime
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      use_pygments: true
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - admonition

exclude_docs: |
  RESEARCH.md
  ANALYSIS_*.md

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Learning Journal:
    - Content Addressable Storage: learning/01-content-addressable-storage.md
    - Bazel Remote Cache Protocol: learning/02-bazel-remote-cache-protocol.md
  - Design:
    - Design Document: PROJECT_BRIEF.md
    - RL Eviction + Agents: ARCHITECTURE_AI.md
    - Testing Strategy: TESTING_STRATEGY.md
  - Changelog: CHANGELOG.md
