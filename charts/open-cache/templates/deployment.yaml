apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-envoy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}-envoy
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-envoy
    spec:
      containers:
        - name: envoy
          image: {{ .Values.envoy.image }}
          ports:
            - containerPort: {{ .Values.envoy.port }}
          volumeMounts:
            - name: config
              mountPath: /etc/envoy
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
      volumes:
        - name: config
          configMap:
            name: {{ .Release.Name }}-envoy
